services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: costoptimizer
      POSTGRES_USER: costoptimizer
      POSTGRES_PASSWORD: costoptimizer
    ports: ["5433:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costoptimizer"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/costoptimizer
      SPRING_DATASOURCE_USERNAME: costoptimizer
      SPRING_DATASOURCE_PASSWORD: costoptimizer
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 10
  web:
    build: ./frontend
    ports: ["5173:80"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
