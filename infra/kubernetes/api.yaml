apiVersion: apps/v1
kind: Deployment
metadata: {name: cost-optimizer-api, namespace: cloud-cost-optimizer}
spec:
  replicas: 2
  selector: {matchLabels: {app: cost-optimizer-api}}
  template:
    metadata: {labels: {app: cost-optimizer-api}}
    spec:
      containers:
        - name: api
          image: YOUR_REGISTRY/cost-optimizer-api:latest
          ports: [{containerPort: 8080}]
          env:
            - {name: SPRING_DATASOURCE_URL, valueFrom: {secretKeyRef: {name: database, key: url}}}
            - {name: SPRING_DATASOURCE_USERNAME, valueFrom: {secretKeyRef: {name: database, key: username}}}
            - {name: SPRING_DATASOURCE_PASSWORD, valueFrom: {secretKeyRef: {name: database, key: password}}}
          resources: {requests: {cpu: 250m, memory: 512Mi}, limits: {cpu: 1, memory: 1Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: cost-optimizer-api, namespace: cloud-cost-optimizer}
spec: {selector: {app: cost-optimizer-api}, ports: [{port: 8080, targetPort: 8080}]}
