apiVersion: apps/v1
kind: Deployment
metadata: {name: cost-optimizer-web, namespace: cloud-cost-optimizer}
spec:
  replicas: 2
  selector: {matchLabels: {app: cost-optimizer-web}}
  template:
    metadata: {labels: {app: cost-optimizer-web}}
    spec:
      containers:
        - name: web
          image: YOUR_REGISTRY/cost-optimizer-web:latest
          ports: [{containerPort: 80}]
          resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 500m, memory: 256Mi}}
---
apiVersion: v1
kind: Service
metadata: {name: cost-optimizer-web, namespace: cloud-cost-optimizer}
spec: {type: LoadBalancer, selector: {app: cost-optimizer-web}, ports: [{port: 80, targetPort: 80}]}
