spring:
  application:
    name: cloud-cost-optimizer
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/costoptimizer}
    username: ${SPRING_DATASOURCE_USERNAME:costoptimizer}
    password: ${SPRING_DATASOURCE_PASSWORD:costoptimizer}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
azure:
  subscription-id: ${AZURE_SUBSCRIPTION_ID:}
